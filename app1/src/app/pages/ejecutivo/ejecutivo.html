<div class="exec-page">
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="assets/logo-banco.jpg" alt="Banco Zand" />
      </div>
      <div class="brand-text">BANCO<br />ZAND</div>
    </div>

    <h1 class="title">Ejecutivo</h1>

    <button class="btn-logout" type="button" (click)="salir()">
      Cerrar<br />sesión
    </button>
  </header>

  <!-- Panel principal -->
  <section class="panel">
    <div class="tiles">
      <!-- Abrir cuentas -->
      <button class="tile green" type="button" (click)="irAbrirCuentas()">
        <div class="tile-top">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <div class="tile-label">Abrir cuentas</div>
      </button>

      <!-- Autorizar solicitudes -->
      <button class="tile yellow" type="button" (click)="irAutorizar()">
        <div class="tile-top">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13l5 5 11-11"/></svg>
        </div>
        <div class="tile-label">Autorizar solicitudes</div>
      </button>

      <!-- Cerrar cuentas -->
      <button class="tile red" type="button" (click)="irCerrar()">
        <div class="tile-top">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </div>
        <div class="tile-label">Cerrar cuentas</div>
      </button>

      <!-- Consultar -->
      <button class="tile blue" type="button" (click)="irConsultar()">
        <div class="tile-top">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" />
            <path d="M20 20l-3.5-3.5" />
          </svg>
        </div>
        <div class="tile-label">Consultar</div>
      </button>
    </div>
  </section>
</div>

<div class="retiros-page" #retirosPage>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="assets/logo-banco.jpg" alt="Banco Zand" />
      </div>
      <div class="brand-text">BANCO<br />ZAND</div>
    </div>

    <h1 class="title">Retiros</h1>

    <button class="btn back" type="button" (click)="regresar()">Regresar</button>
  </header>

  <!-- Panel blanco con opciones -->
  <section class="panel">
    <button class="row" type="button" (click)="retiroEfectivo()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M4 7h16v10H4zM7 11h10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="text">Retiro de efectivo</span>
    </button>

    <button class="row" type="button" (click)="retiroSinTarjeta()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M6 8h12M6 12h8M6 16h6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="text">Retiro sin tarjeta</span>
    </button>

    <button class="row" type="button" (click)="historialRetiros()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="5" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M8 9h8M8 13h8M8 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="text">Historial de retiros</span>
    </button>
  </section>
</div>

<div class="pagos-page" #pagosPage>
  <!-- Barra superior roja -->
  <header class="topbar">
    <div class="brand">
      <div class="logo"><img src="assets/logo-banco.jpg" alt="Banco Zand" /></div>
      <div class="brand-text">BANCO<br />ZAND</div>
    </div>
    <h1 class="title">Pagos</h1>
    <button class="btn back" type="button" (click)="regresar()">Regresar</button>
  </header>

  <!-- Panel -->
  <section class="panel">
    <button class="row" type="button" (click)="pagarConCodigo()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 9h4M7 12h4M7 15h4M14 9h3M14 12h3M14 15h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="text">Pagar con código</span>
    </button>

    <button class="row" type="button" (click)="prestamoOtraPersona()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M8 13c2.5 2.2 9 2.2 12 0M6 8h12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M6 13l-2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="text">Préstamo de otra persona</span>
    </button>

    <button class="row" type="button" (click)="tarjetaCredito()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M7 14h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="text">Tarjeta de crédito</span>
    </button>

    <button class="row" type="button" (click)="unServicio()">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 20a6 6 0 0 1 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="text">Un servicio</span>
    </button>
  </section>
</div>
